name: Gerar APK DockFlow Supervisor

on:
  workflow_dispatch:
  push:
    branches: [ "principal" ]

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Criar estrutura Android
        run: |
          mkdir -p app/src/main/java/com/owlltech/dockflow
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          if [ -f "coruja.png" ]; then
            cp coruja.png app/src/main/res/drawable/coruja.png
          else
            echo "ERRO: coruja.png não encontrada na raiz do repositório"
            exit 1
          fi

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'DockFlowSupervisor'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.owlltech.dockflow'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.owlltech.dockflow'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="DockFlow Supervisor"
                  android:icon="@drawable/coruja"
                  android:roundIcon="@drawable/coruja"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/drawable/splash_background.xml <<'EOF'
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="#F4FAF6" />
              <item>
                  <bitmap
                      android:gravity="center"
                      android:src="@drawable/coruja" />
              </item>
          </layer-list>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:statusBarColor">#F4FAF6</item>
                  <item name="android:navigationBarColor">#F4FAF6</item>
                  <item name="android:windowBackground">@drawable/splash_background</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/java/com/owlltech/dockflow/MainActivity.java <<'EOF'
          package com.owlltech.dockflow;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);

                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://dockfloww.netlify.app/");
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Gerar APK
        run: gradle assembleDebug

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: DockFlow-Supervisor-APK
          path: app/build/outputs/apk/debug/*.apk
