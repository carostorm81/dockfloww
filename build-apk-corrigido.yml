name: Gerar APK DockFlow Supervisor

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Compilar APK na nuvem
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Detectar pasta do projeto
        id: project
        shell: bash
        run: |
          if [ -f "settings.gradle" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "dockflow_supervisor_android/settings.gradle" ]; then
            echo "dir=dockflow_supervisor_android" >> "$GITHUB_OUTPUT"
          else
            echo "Não encontrei settings.gradle na raiz nem em dockflow_supervisor_android/"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Gerar APK debug
        run: gradle -p "${{ steps.project.outputs.dir }}" :app:assembleDebug --no-daemon

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: DockFlow-Supervisor-APK
          path: |
            app/build/outputs/apk/debug/*.apk
            dockflow_supervisor_android/app/build/outputs/apk/debug/*.apk
