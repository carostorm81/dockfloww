name: Gerar APK DockFlow Supervisor

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Compilar APK na nuvem
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Gerar APK debug
        run: gradle :app:assembleDebug --no-daemon

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: DockFlow-Supervisor-APK
          path: app/build/outputs/apk/debug/*.apk
